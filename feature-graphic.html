<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1024px;
    height: 500px;
    overflow: hidden;
    background: #0a0a2e;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    position: relative;
  }

  .bg-gradient {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 70% 50%, #1e1460 0%, #0a0a2e 70%);
  }

  .bubble {
    position: absolute;
    background: rgba(99, 102, 241, 0.15);
    border: 1.5px solid rgba(99, 102, 241, 0.35);
    border-radius: 24px;
    padding: 10px 18px;
    color: #a5b4fc;
    font-size: 15px;
    font-weight: 700;
    white-space: nowrap;
  }

  .bubble.correct {
    background: rgba(99, 102, 241, 0.28);
    border-color: rgba(139, 92, 246, 0.7);
    color: #c4b5fd;
  }

  .bubble.gold {
    background: rgba(245, 158, 11, 0.2);
    border-color: rgba(245, 158, 11, 0.6);
    color: #fcd34d;
  }

  .center {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    z-index: 10;
  }

  .title {
    font-size: 72px;
    font-weight: 900;
    color: #fff;
    letter-spacing: 1px;
    line-height: 1.05;
    text-shadow: 0 4px 32px rgba(99,102,241,0.5);
  }

  .title span {
    color: #818cf8;
  }

  .tagline {
    margin-top: 14px;
    font-size: 19px;
    color: #a5b4fc;
    font-weight: 500;
    letter-spacing: 0.3px;
  }

  .target-chip {
    display: inline-block;
    margin-top: 20px;
    background: rgba(99, 102, 241, 0.2);
    border: 2px solid #6366f1;
    border-radius: 30px;
    padding: 8px 28px;
    color: #fff;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .glow {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
  }
  .glow1 { width: 300px; height: 300px; background: rgba(99,102,241,0.18); top: -80px; right: 180px; }
  .glow2 { width: 220px; height: 220px; background: rgba(139,92,246,0.15); bottom: -60px; left: 120px; }
  .glow3 { width: 180px; height: 180px; background: rgba(245,158,11,0.1); top: 60px; left: 60px; }
</style>
</head>
<body>
  <div class="bg-gradient"></div>
  <div class="glow glow1"></div>
  <div class="glow glow2"></div>
  <div class="glow glow3"></div>

  <!-- Left side bubbles -->
  <div class="bubble" style="left:28px; top:52px;">rapid</div>
  <div class="bubble correct" style="left:14px; top:118px;">swift ✓</div>
  <div class="bubble" style="left:44px; top:192px;">brisk</div>
  <div class="bubble correct" style="left:18px; top:262px;">speedy ✓</div>
  <div class="bubble" style="left:52px; top:336px;">nimble</div>
  <div class="bubble gold" style="left:22px; top:410px;">quick ✓</div>

  <!-- Right side bubbles -->
  <div class="bubble correct" style="right:32px; top:48px;">fleet ✓</div>
  <div class="bubble" style="right:18px; top:120px;">hasty</div>
  <div class="bubble correct" style="right:44px; top:196px;">zippy ✓</div>
  <div class="bubble" style="right:24px; top:268px;">agile</div>
  <div class="bubble gold" style="right:38px; top:344px;">lively ✓</div>
  <div class="bubble" style="right:16px; top:418px;">alert</div>

  <!-- Center content -->
  <div class="center">
    <div class="title">Tappy Word<br/><span>Burst</span></div>
    <div class="tagline">How many synonyms can you find?</div>
    <div class="target-chip">fast</div>
  </div>
</body>
</html>
